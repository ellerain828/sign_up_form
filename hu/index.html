<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="./big-yellow-flower.ico" type="image/x-icon">
    <title>Regisztráció</title>
</head>
<body>
    <div class="logo">
        <h1>Bunni</h1>
        <img src="./rabbit-bunny-animal-clipart-xl.png" alt="Logo">
    </div>
    <fieldset class="form">
        <h1 class="form-title">Hozzon létre fiókot</h1>
        <p id="disclaimer">
            FIGYELMEZTETÉS
            <br>
            Ez nem egy valódi online szolgáltatás. Az adatai nem lesznek tárolva.
        </p>
        <hr>
        <form action="" method="get" autocomplete="off">
            <div class="input-group">
                <legend class="titleforinput">Keresztnév:</legend>
                <input type="text" name="firstname" id="first_name" placeholder="Add meg a keresztneved" required>
                <legend class="titleforinput">Vezetéknév:</legend>
                <input type="text" name="lastname" id="last_name" placeholder="Add meg a vezetékneved" required>
            </div>
            <div class="input-group">
                <legend class="titleforinput">Email:</legend>
                <input type="email" name="email" id="email" placeholder="Add meg az email címed" required>
            </div>
            <div class="input-group">
                <legend class="titleforinput">Telefonszám:</legend>
                <input type="tel" name="phone" id="phone" placeholder="Add meg a telefonszámod" pattern="^\+?[\d\s\-().]{7,15}$" required>
            </div>
            <div class="input-group">
                <legend class="titleforinput">Jelszó:</legend>
                <input type="password" name="password" id="password" placeholder="Add meg a jelszavad" required>
                <legend class="titleforinput">Jelszó megerősítése:</legend>
                <input type="password" id="confirm" oninput="this.setCustomValidity
                (this.value !== document.getElementById('password').value ? 'Passwords do not match' : '')"
                placeholder="Add meg a jelszavad mégegyszer" required></div>
            <div>
                <button type="submit">Fiók létrehozása</button>
                <p class="login">Már van fiókja? <a href="#">Jelentkezzen be</a></p>
            </div>
            <div class="lang-selector">
                <a href="./index.html" target="_self"><img src="./usflag.png" alt="English" class="flag"></a>
                <a href="./index_hu.html" target="_self"><img src="./hunflag.svg" alt="Hungarian" class="flag"></a>
            </div>
        </form>
    </fieldset>
    
</body>
</html>
